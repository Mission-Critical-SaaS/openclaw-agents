version: "3.8"
services:
  openclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: openclaw:latest
    container_name: openclaw-agents
    restart: unless-stopped
    volumes:
      - /opt/openclaw/config:/app/config
      - /opt/openclaw/entrypoint.sh:/app/entrypoint.sh
      - /opt/openclaw/docker/entrypoint.sh:/entrypoint.sh
      # Agent workspace bind mounts — persist IDENTITY.md, KNOWLEDGE.md across restarts
      - /opt/openclaw/agents/scout/workspace:/tmp/agents/scout/workspace
      - /opt/openclaw/agents/trak/workspace:/tmp/agents/trak/workspace
      - /opt/openclaw/agents/kit/workspace:/tmp/agents/kit/workspace
    entrypoint: ["/app/entrypoint.sh"]
    command: ["/entrypoint.sh"]
    environment:
      - AWS_DEFAULT_REGION=us-east-1
