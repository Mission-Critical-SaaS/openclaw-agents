# ──────────────────────────────────────────────────────────
# OpenClaw Multi-Agent Gateway — Docker Compose
# ──────────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env   # fill in your tokens
#   docker-compose up -d
# ──────────────────────────────────────────────────────────

version: "3.8"

services:
  openclaw:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: openclaw-agents
    restart: unless-stopped
    env_file: .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      # Persist all OpenClaw state (sessions, agent data, config)
      - openclaw-data:/root/.openclaw
      - openclaw-logs:/data/logs
      # Mount agent configs (override on deploy)
      - ./config:/root/.openclaw-config:ro
      - ./agents:/tmp/agents:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "openclaw"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  openclaw-data:
    driver: local
  openclaw-logs:
    driver: local
