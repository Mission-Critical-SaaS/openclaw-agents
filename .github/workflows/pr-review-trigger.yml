name: Ensemble PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

permissions:
  statuses: write
  pull-requests: read

jobs:
  trigger-review:
    name: Request Agent Ensemble Review
    runs-on: ubuntu-latest
    # Skip draft PRs — only review when ready
    if: github.event.pull_request.draft == false

    steps:
      - name: Extract Jira key from PR
        id: jira
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          BRANCH="${{ github.head_ref }}"
          # Look for PROJ-123 pattern in title first, then branch name
          KEY=$(echo "$TITLE $BRANCH" | grep -oE '[A-Z]+-[0-9]+' | head -1)
          echo "key=${KEY:-none}" >> $GITHUB_OUTPUT

      - name: Set pending status check
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=pending \
            -f description="Ensemble review: awaiting Kit" \
            -f context="ensemble-review"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify #sdlc-reviews via Slack API
        id: slack_notify
        if: env.HAS_TOKEN == 'true'
        env:
          HAS_TOKEN: ${{ secrets.SLACK_BOT_TOKEN_REVIEW != '' }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN_REVIEW }}
          SDLC_CHANNEL: C0AKL3FMGR5
        run: |
          # Use Slack chat.postMessage API (messages from a real bot user
          # are recognized by the gateway's allowFrom list, unlike webhooks
          # which create anonymous bot_messages with no user_id).
          TITLE=$(echo "${{ github.event.pull_request.title }}" | sed 's/"/\\"/g')
          RESPONSE=$(curl -s -X POST 'https://slack.com/api/chat.postMessage' \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "{
              \"channel\": \"$SDLC_CHANNEL\",
              \"text\": \"📋 *PR Review Requested*\\n*Repo*: ${{ github.repository }}\\n*PR*: #${{ github.event.pull_request.number }} — ${TITLE}\\n*Author*: ${{ github.event.pull_request.user.login }}\\n*Jira*: ${{ steps.jira.outputs.key }}\\n*URL*: ${{ github.event.pull_request.html_url }}\\n\\n<@U0AKF614URE> please run ensemble review.\"
            }")
          OK=$(echo "$RESPONSE" | jq -r '.ok')
          if [ "$OK" = "true" ]; then
            echo "✅ Posted PR review request to #sdlc-reviews"
          else
            ERROR=$(echo "$RESPONSE" | jq -r '.error')
            echo "❌ Slack API error: $ERROR"
            exit 1
          fi

      - name: Fallback — webhook (deprecated)
        if: steps.slack_notify.outcome == 'skipped' && env.HAS_WEBHOOK == 'true'
        env:
          HAS_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_SDLC_REVIEWS != '' }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_SDLC_REVIEWS }}
        run: |
          echo "⚠️  Using deprecated webhook. Set SLACK_BOT_TOKEN_REVIEW secret to fix."
          TITLE=$(echo "${{ github.event.pull_request.title }}" | sed 's/"/\\"/g')
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \"📋 *PR Review Requested*\\n*Repo*: ${{ github.repository }}\\n*PR*: #${{ github.event.pull_request.number }} — ${TITLE}\\n*Author*: ${{ github.event.pull_request.user.login }}\\n*Jira*: ${{ steps.jira.outputs.key }}\\n*URL*: ${{ github.event.pull_request.html_url }}\\n\\n<@U0AKF614URE> please run ensemble review.\"
            }"

      - name: Log review request (no Slack configured)
        if: steps.slack_notify.outcome == 'skipped' && env.HAS_WEBHOOK != 'true'
        env:
          HAS_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_SDLC_REVIEWS != '' }}
        run: |
          echo "⚠️  No Slack notification method configured"
          echo "PR review request would have been sent for:"
          echo "  Repo: ${{ github.repository }}"
          echo "  PR: #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
          echo "  Jira: ${{ steps.jira.outputs.key }}"
          echo ""
          echo "To enable Slack notifications:"
          echo "  1. Add Trak's bot token as repo secret: SLACK_BOT_TOKEN_REVIEW"
          echo "  2. (Deprecated) Or use SLACK_WEBHOOK_SDLC_REVIEWS"
