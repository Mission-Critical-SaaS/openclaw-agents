name: Deploy OpenClaw

on:
  push:
    tags:
      - 'v*'

env:
  INSTANCE_ID: i-0acd7169101e93388
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Deploying tag: $TAG"
          
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"cd /opt/openclaw && ./deploy.sh $TAG 2>&1\"]" \
            --timeout-seconds 600 \
            --query "Command.CommandId" \
            --output text)
          
          echo "SSM Command ID: $COMMAND_ID"
          
          # Wait for completion
          for i in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ env.INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.INSTANCE_ID }}" \
                --query "StandardOutputContent" --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ env.INSTANCE_ID }}" \
                --query "StandardErrorContent" --output text
              exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for deploy"
          exit 1

      - name: Verify deployment
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"cd /opt/openclaw && docker ps --filter name=openclaw-agents --format '{{.Names}} {{.Status}}' && docker logs openclaw-agents 2>&1 | grep -E '(BOOTSTRAP_OK|gateway is live|socket mode connected|ERROR)' | tail -10\"]" \
            --timeout-seconds 30 \
            --query "Command.CommandId" \
            --output text)

          sleep 15

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.INSTANCE_ID }}" \
            --query "StandardOutputContent" --output text

      - name: Notify Slack on failure
        if: failure()
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SLACK_TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id openclaw/agents \
            --query SecretString --output text | python3 -c "import sys,json; print(json.loads(sys.stdin.read())['SLACK_BOT_TOKEN_SCOUT'])")
          
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"leads\", \"text\": \":x: *OpenClaw Deploy Failed*\nTag: $TAG\nAction: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

